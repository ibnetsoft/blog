{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto">

    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-black text-gray-800 dark:text-white flex items-center gap-3">
            <span class="p-2 bg-blue-500/10 text-blue-500 rounded-xl">⚙️</span>
            <span>설정</span>
        </h2>
        <button onclick="saveApiSettings()"
            class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-95">
            💾 모든 설정 저장
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-12">
        <!-- Left Column -->
        <div class="space-y-6">
            <!-- Gemini AI -->
            <section class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700/50 hover:border-blue-500/30 transition-all">
                <h3 class="font-black text-gray-800 dark:text-white mb-5 flex items-center gap-2 text-lg">
                    🤖 Gemini AI
                </h3>
                <div class="space-y-1.5">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">Google AI API Key</label>
                    <input type="password" id="geminiKey" placeholder="AIzaSy..."
                        class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none transition-all">
                </div>
            </section>

            <!-- WordPress -->
            <section class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700/50 hover:border-blue-500/30 transition-all">
                <h3 class="font-black text-gray-800 dark:text-white mb-5 flex items-center gap-2 text-lg">
                    🔵 WordPress
                </h3>
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">사이트 URL</label>
                        <input type="text" id="wpUrl" placeholder="https://your-blog.com"
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">사용자명</label>
                        <input type="text" id="wpUsername" placeholder="admin"
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">앱 비밀번호</label>
                        <input type="password" id="wpPassword" placeholder="xxxx xxxx xxxx xxxx xxxx xxxx"
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none transition-all">
                    </div>
                </div>
            </section>
        </div>

        <!-- Right Column -->
        <div class="space-y-6">
            <!-- Telegram -->
            <section class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700/50 hover:border-sky-500/30 transition-all">
                <h3 class="font-black text-gray-800 dark:text-white mb-5 flex items-center gap-2 text-lg">
                    ✈️ Telegram (SNS)
                </h3>
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">Bot Token</label>
                        <input type="password" id="tgToken" placeholder="712345678:AAEf..."
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 focus:outline-none transition-all">
                    </div>
                    
                    <div class="border-t border-gray-100 dark:border-gray-700 pt-5">
                        <div class="flex items-center justify-between mb-4">
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">채널/그룹 목록</label>
                            <button onclick="addTelegramChannelUI()" 
                                class="text-[10px] bg-sky-500/10 text-sky-500 px-3 py-1.5 rounded-lg hover:bg-sky-500/20 font-black transition-all">
                                ＋ 추가
                            </button>
                        </div>
                        <div id="tgChannelsContainer" class="space-y-2.5">
                            <!-- Dynamic List -->
                        </div>
                        <input type="hidden" id="tgChatId">
                    </div>
                    <p class="text-[10px] text-gray-400 font-medium leading-relaxed bg-gray-50 dark:bg-gray-900/30 p-3 rounded-xl">
                        @BotFather에게 받은 토큰과 각 그룹/채널의 숫자 ID를 입력하세요. 메세지는 선택한 채널로 전송됩니다.
                    </p>
                </div>
            </section>

            <!-- 구글 블로거 계정 목록 -->
            <section class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700/50 hover:border-orange-500/30 transition-all">
                <div class="flex items-center justify-between mb-5">
                    <h3 class="font-black text-gray-800 dark:text-white flex items-center gap-2 text-lg">
                        🟠 Google Blogger
                    </h3>
                    <button onclick="openAddAccountModal()"
                        class="px-3 py-1.5 bg-orange-500 hover:bg-orange-600 text-white text-[10px] font-black rounded-lg shadow-lg shadow-orange-500/20 transition-all active:scale-95">
                        ＋ 새 계정 추가
                    </button>
                </div>

                <div id="accountList" class="space-y-3">
                    <p class="text-xs text-gray-400 text-center py-4">불러오는 중...</p>
                </div>
            </section>
        </div>
    </div>
</div>
</div>

<!-- 새 계정 추가 모달 -->
<div id="addAccountModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md">
        <div class="p-5 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <h3 class="font-bold text-gray-800 dark:text-white">🟠 구글 블로거 계정 추가</h3>
            <button onclick="closeAddAccountModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl leading-none">×</button>
        </div>
        <div class="p-5 space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">계정 이름 <span class="text-red-400">*</span></label>
                <input type="text" id="newAccName" placeholder="예: 내 여행 블로그"
                    class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Blog ID <span class="text-red-400">*</span></label>
                <input type="text" id="newAccBlogId" placeholder="1234567890123456789"
                    class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-none">
                <p class="text-[11px] text-gray-400 mt-1">Blogger 주소창 URL의 숫자 ID</p>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Google OAuth Client ID</label>
                <input type="text" id="newAccClientId" placeholder="비워두면 전역 설정 사용"
                    class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Google OAuth Client Secret</label>
                <input type="password" id="newAccClientSecret" placeholder="비워두면 전역 설정 사용"
                    class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">게시 언어 (자동 번역)</label>
                <select id="newAccLang"
                    class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-orange-500 focus:outline-none">
                    <option value="ja">🇯🇵 일본어 (Japanese)</option>
                    <option value="en">🇺🇸 영어 (English)</option>
                    <option value="es">🇪🇸 스페인어 (Spanish)</option>
                    <option value="de">🇩🇪 독일어 (German)</option>
                    <option value="fr">🇫🇷 프랑스어 (French)</option>
                    <option value="it">🇮🇹 이탈리아어 (Italian)</option>
                    <option value="pt">🇧🇷 포르투갈어 (Portuguese)</option>
                    <option value="id">🇮🇩 인도네시아어 (Indonesian)</option>
                    <option value="ar">🇸🇦 아랍어 (Arabic)</option>
                    <option value="ko">🇰🇷 한국어 (Korean)</option>
                    <option value="vi">🇻🇳 베트남어 (Vietnamese)</option>
                </select>
            </div>
        </div>
        <div class="p-5 pt-0 flex gap-3">
            <button onclick="createAccount()"
                class="flex-1 py-2 bg-orange-500 hover:bg-orange-600 text-white font-bold text-sm rounded-lg transition-colors">
                계정 추가
            </button>
            <button onclick="closeAddAccountModal()"
                class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                취소
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // ── Telegram 다중 채널 관리 ─────────────────────────
    let telegramChannels = [];

    function renderTelegramChannels() {
        const container = document.getElementById('tgChannelsContainer');
        if (telegramChannels.length === 0) {
            container.innerHTML = `<p class="text-[10px] text-gray-400 italic py-2">등록된 채널이 없습니다.</p>`;
            return;
        }
        container.innerHTML = telegramChannels.map((ch, idx) => `
            <div class="flex items-center gap-2 group">
                <input type="text" placeholder="이름 (예: 공지방)" value="${ch.name || ''}" 
                    oninput="updateTelegramChannel(${idx}, 'name', this.value)"
                    class="flex-1 px-2 py-1.5 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs focus:ring-1 focus:ring-blue-500 focus:outline-none">
                <input type="text" placeholder="Chat ID" value="${ch.chat_id || ''}" 
                    oninput="updateTelegramChannel(${idx}, 'chat_id', this.value)"
                    class="w-32 px-2 py-1.5 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded text-xs font-mono focus:ring-1 focus:ring-blue-500 focus:outline-none">
                <button onclick="removeTelegramChannel(${idx})" class="p-1.5 text-gray-300 hover:text-red-500 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        `).join('');
    }

    function addTelegramChannelUI() {
        telegramChannels.push({ name: '', chat_id: '' });
        renderTelegramChannels();
    }

    function updateTelegramChannel(idx, key, val) {
        if (telegramChannels[idx]) telegramChannels[idx][key] = val.trim();
    }

    function removeTelegramChannel(idx) {
        telegramChannels.splice(idx, 1);
        renderTelegramChannels();
    }

    // ── 초기 로드 ──────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        await loadApiSettings();
        await loadAccounts();
    });

    // ── API 설정 불러오기 ──────────────────────────────
    async function loadApiSettings() {
        try {
            const res = await fetch('/api/settings/keys');
            const data = await res.json();
            document.getElementById('geminiKey').value = data.gemini?.value || '';
            document.getElementById('wpUrl').value = data.wp_url?.value || '';
            document.getElementById('wpUsername').value = data.wp_username?.value || '';
            document.getElementById('wpPassword').value = data.wp_password?.value || '';
            document.getElementById('tgToken').value = data.telegram_token?.value || '';
            document.getElementById('tgChatId').value = data.telegram_chat_id?.value || '';
            
            // Telegram Channels List
            try {
                const channelsVal = data.telegram_channels?.value;
                telegramChannels = (typeof channelsVal === 'string') ? JSON.parse(channelsVal || '[]') : (channelsVal || []);
            } catch(e) { telegramChannels = []; }
            renderTelegramChannels();
        } catch (e) { console.error('설정 로드 실패', e); }
    }

    // ── API 설정 저장 ──────────────────────────────────
    async function saveApiSettings() {
        const btn = document.querySelector('button[onclick="saveApiSettings()"]');
        const originalText = btn.innerHTML;
        
        try {
            btn.disabled = true;
            btn.innerHTML = '<span>⏳ 저장 중...</span>';

            const body = {
                gemini_api_key: document.getElementById('geminiKey').value.trim(),
                wp_url: document.getElementById('wpUrl').value.trim(),
                wp_username: document.getElementById('wpUsername').value.trim(),
                wp_password: document.getElementById('wpPassword').value.trim(),
                telegram_token: document.getElementById('tgToken').value.trim(),
                telegram_chat_id: document.getElementById('tgChatId').value.trim(),
                telegram_channels: telegramChannels,
            };

            console.log('[Settings] Saving payload:', body);

            const res = await fetch('/api/settings/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                Utils.showToast('모든 설정이 성공적으로 저장되었습니다.', 'success');
                // 저장 후 최신 상태 다시 로드 (UI 동기화)
                await loadApiSettings();
            } else {
                const err = await res.json();
                throw new Error(err.error || '서버 오류');
            }
        } catch (e) {
            console.error('[Settings] Save Failed:', e);
            Utils.showToast('저장 실패: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    // ── 계정 목록 불러오기 ────────────────────────────
    async function loadAccounts() {
        const container = document.getElementById('accountList');
        try {
            const res = await fetch('/api/blog/accounts');
            const data = await res.json();
            const accounts = data.accounts || [];

            if (accounts.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 text-center py-6">아직 연동된 구글 블로거 계정이 없습니다.<br>위 버튼으로 계정을 추가하세요.</p>`;
                return;
            }

            container.innerHTML = accounts.map(acc => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg border border-gray-200 dark:border-gray-600" id="acc-${acc.id}">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-sm text-gray-800 dark:text-white truncate">${acc.name}</span>
                            ${acc.connected
                                ? `<span class="shrink-0 text-[10px] bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400 px-2 py-0.5 rounded-full font-bold">✓ 연동됨</span>`
                                : `<span class="shrink-0 text-[10px] bg-yellow-100 dark:bg-yellow-900/40 text-yellow-600 dark:text-yellow-400 px-2 py-0.5 rounded-full font-bold">미연동</span>`
                            }
                        </div>
                        <div class="flex items-center gap-2 mt-0.5">
                            <p class="text-[11px] text-gray-400">Blog ID: ${acc.blog_id || '미설정'}</p>
                            <span class="text-[10px] text-gray-300">|</span>
                            <select onchange="updateAccountLang(${acc.id}, this.value)" 
                                class="bg-transparent text-[11px] text-blue-500 dark:text-blue-400 border-none p-0 focus:ring-0 cursor-pointer font-medium">
                                <option value="ja" ${acc.lang === 'ja' ? 'selected' : ''}>🇯🇵 일본어</option>
                                <option value="en" ${acc.lang === 'en' ? 'selected' : ''}>🇺🇸 영어</option>
                                <option value="es" ${acc.lang === 'es' ? 'selected' : ''}>🇪🇸 스페인어</option>
                                <option value="de" ${acc.lang === 'de' ? 'selected' : ''}>🇩🇪 독일어</option>
                                <option value="fr" ${acc.lang === 'fr' ? 'selected' : ''}>🇫🇷 프랑스어</option>
                                <option value="it" ${acc.lang === 'it' ? 'selected' : ''}>🇮🇹 이탈리아어</option>
                                <option value="pt" ${acc.lang === 'pt' ? 'selected' : ''}>🇧🇷 포르투갈어</option>
                                <option value="id" ${acc.lang === 'id' ? 'selected' : ''}>🇮🇩 인도네시아어</option>
                                <option value="ar" ${acc.lang === 'ar' ? 'selected' : ''}>🇸🇦 아랍어</option>
                                <option value="ko" ${acc.lang === 'ko' ? 'selected' : ''}>🇰🇷 한국어</option>
                                <option value="vi" ${acc.lang === 'vi' ? 'selected' : ''}>🇻🇳 베트남어</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="startOAuth(${acc.id})"
                            class="px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${acc.connected ? 'bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-600 dark:text-gray-300' : 'bg-orange-500 hover:bg-orange-600 text-white'}">
                            ${acc.connected ? '재연동' : 'Google 연동'}
                        </button>
                        <button onclick="deleteAccount(${acc.id}, '${acc.name.replace(/'/g, "\\'")}')"
                            class="px-2 py-1.5 text-xs text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                            삭제
                        </button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = `<p class="text-xs text-red-400 text-center py-4">계정 목록 로드 실패</p>`;
        }
    }

    // ── 모달 열기/닫기 ────────────────────────────────
    function openAddAccountModal() {
        document.getElementById('addAccountModal').classList.remove('hidden');
        document.getElementById('addAccountModal').classList.add('flex');
        document.getElementById('newAccName').focus();
    }

    function closeAddAccountModal() {
        document.getElementById('addAccountModal').classList.add('hidden');
        document.getElementById('addAccountModal').classList.remove('flex');
        ['newAccName', 'newAccBlogId', 'newAccClientId', 'newAccClientSecret'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('newAccLang').value = 'ja';
    }

    // ── 계정 생성 ──────────────────────────────────────
    async function createAccount() {
        const name = document.getElementById('newAccName').value.trim();
        const blogId = document.getElementById('newAccBlogId').value.trim();
        const clientId = document.getElementById('newAccClientId').value.trim();
        const clientSecret = document.getElementById('newAccClientSecret').value.trim();
        const lang = document.getElementById('newAccLang').value;

        if (!name) { Utils.showToast('계정 이름을 입력하세요', 'warning'); return; }
        if (!blogId) { Utils.showToast('Blog ID를 입력하세요', 'warning'); return; }

        try {
            const res = await fetch('/api/blog/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, blog_id: blogId, client_id: clientId, client_secret: clientSecret, lang })
            });
            const data = await res.json();
            closeAddAccountModal();
            await loadAccounts();
            Utils.showToast(`"${name}" 계정이 추가됐습니다. Google 연동 버튼을 눌러 인증하세요.`, 'success');
        } catch (e) {
            Utils.showToast('계정 추가 실패', 'error');
        }
    }

    // ── 언어 변경 ──────────────────────────────────────
    async function updateAccountLang(id, newLang) {
        try {
            const res = await fetch(`/api/blog/accounts/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lang: newLang })
            });
            if (res.ok) {
                Utils.showToast('언어 설정이 변경되었습니다.', 'success');
            } else {
                throw new Error('변경 실패');
            }
        } catch (e) {
            Utils.showToast('언어 변경 실패', 'error');
            await loadAccounts(); // 원래대로 복구
        }
    }

    // ── OAuth 연동 ────────────────────────────────────
    function startOAuth(accountId) {
        window.open(`/api/blog/accounts/${accountId}/oauth/start`, '_blank', 'width=600,height=700');
        // 팝업 닫힌 후 목록 갱신 (폴링)
        const poll = setInterval(async () => {
            const res = await fetch(`/api/blog/accounts/${accountId}/status`);
            const data = await res.json();
            if (data.connected) {
                clearInterval(poll);
                await loadAccounts();
                Utils.showToast(`"${data.name}" 연동 완료!`, 'success');
            }
        }, 2000);
        // 최대 2분 후 폴링 중단
        setTimeout(() => clearInterval(poll), 120000);
    }

    // ── 계정 삭제 ──────────────────────────────────────
    async function deleteAccount(id, name) {
        if (!confirm(`"${name}" 계정을 삭제할까요?\n연동 정보도 모두 삭제됩니다.`)) return;
        try {
            await fetch(`/api/blog/accounts/${id}`, { method: 'DELETE' });
            await loadAccounts();
            Utils.showToast('삭제됐습니다', 'success');
        } catch (e) {
            Utils.showToast('삭제 실패', 'error');
        }
    }
</script>
{% endblock %}
