{% extends "base.html" %}

{% block content %}
<div class="max-w-full mx-4 lg:mx-8 space-y-8 animate-fadeIn">
    <!-- Health Alert Banner (Removed) -->
    <!-- Main Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 pt-4">
        <!-- Left: Topic Input -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-100 dark:border-gray-700/50 bg-gradient-to-br from-white to-purple-50/30 dark:from-gray-800 dark:to-purple-900/10">
                <div class="flex items-center gap-2 mb-6">
                    <span class="p-2 bg-purple-500/10 text-purple-500 rounded-lg text-xl shadow-inner">💡</span>
                    <h2 class="text-lg font-bold text-gray-800 dark:text-white">생성 주제 및 학습 자료</h2>
                </div>

                <div class="space-y-6">
                    <!-- NotebookLM Style Source Learning -->
                    <div class="p-4 bg-blue-50/50 dark:bg-blue-900/10 rounded-2xl border border-blue-100 dark:border-blue-900/20">
                        <label class="block text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-3 px-1">Source Learning (NotebookLM Style)</label>
                        
                        <div class="flex gap-2 mb-3">
                            <input type="text" id="sourceUrl" placeholder="뉴스 URL 또는 유튜브 링크 입력" 
                                class="flex-1 bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 text-xs focus:ring-2 focus:ring-blue-500">
                            <button onclick="addSource('url')" class="px-3 py-2 bg-blue-600 text-white rounded-xl font-bold text-xs hover:bg-blue-500 transition-all">추가</button>
                        </div>

                        <div class="flex items-center justify-between gap-2">
                             <input type="file" id="sourceFile" class="hidden" accept=".pdf,.txt,.md" onchange="addSource('file')">
                             <button onclick="document.getElementById('sourceFile').click()" 
                                class="w-full py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-xl font-bold text-xs border border-dashed border-gray-300 dark:border-gray-600 hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                                <span>📁 PDF / TXT 파일 추가</span>
                             </button>
                        </div>

                        <div id="sourceList" class="mt-4 space-y-2 overflow-y-auto max-h-[150px]">
                            <!-- 추가된 소스 리스트 표시 -->
                        </div>

                        <!-- 전체 학습된 텍스트 저장용 (숨김) -->
                        <textarea id="hiddenSourceContent" class="hidden"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 px-1">카테고리 (디자인 스타일)</label>
                        <select id="categorySelect" 
                            class="input-field w-full bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-700 rounded-2xl p-3 text-sm font-bold text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500 shadow-sm appearance-none">
                            <option value="General" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">기본 (General Style)</option>
                            <option value="Automobile" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">자동차 (Automobile)</option>
                            <option value="Beauty" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">뷰티 (Beauty)</option>
                            <option value="Finance" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">금융/경제 (Finance)</option>
                            <option value="FX외환" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">FX/외환 (Forex)</option>
                            <option value="K-pop" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">K-pop/엔터 (Entertainment)</option>
                            <option value="Medical" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">의료/건강 (Medical)</option>
                            <option value="Shopping" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">쇼핑/리뷰 (Shopping)</option>
                            <option value="Sports" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">스포츠 (Sports)</option>
                            <option value="Trip" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">여행 (Travel)</option>
                            <option value="웹서비스" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100">웹서비스/SaaS (Web Service)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 px-1">블로그 주제 (또는 핵심 키워드)</label>
                        <textarea id="topicInput"
                            class="input-field w-full bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-700 rounded-2xl p-4 text-sm font-medium text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500 shadow-sm"
                            rows="6" placeholder="AI가 어떤 글을 써주길 원하시나요? 주제를 상세히 적을수록 더 정확한 결과가 나옵니다.&#10;예: 2026년 일본 여행 필수 오미야게 추천 TOP 10"></textarea>
                    </div>


                    <button id="btnGenerateIndependent" onclick="generateIndependentMulti()"
                        class="w-full btn-primary flex items-center justify-center gap-3 py-4 rounded-2xl shadow-xl shadow-purple-500/20 bg-gradient-to-r from-purple-600 via-purple-500 to-pink-600 border-0 transform hover:scale-[1.02] active:scale-95 transition-all mt-4 group">
                        <span class="text-2xl group-hover:animate-bounce">💎</span>
                        <span class="font-black text-xl tracking-tight">AI 다국어 동시 작성 시작</span>
                    </button>
                </div>
            </div>

            <!-- AI Image Generation Section -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-100 dark:border-gray-700/50 bg-gradient-to-br from-white to-purple-50/10 dark:from-gray-800 dark:to-purple-900/5">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-[10px] font-black text-purple-500 uppercase tracking-[0.2em]">AI IMAGE GENERATION</h2>
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <span class="text-[10px] font-black text-gray-400 group-hover:text-purple-500 transition-colors">사람 제거</span>
                        <div class="relative">
                            <input type="checkbox" id="noHumanToggle" class="sr-only peer" checked>
                            <div class="w-8 h-4 bg-gray-200 dark:bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-purple-600 shadow-inner"></div>
                        </div>
                    </label>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex-1 flex items-center bg-gray-50/50 dark:bg-gray-900/50 border border-gray-100 dark:border-gray-700 rounded-xl px-3 py-2">
                        <span class="text-[11px] font-bold text-gray-500 dark:text-gray-400 mr-2">이미지 수:</span>
                        <input type="number" id="imgCount" value="1" min="1" max="4" 
                            class="bg-transparent border-none p-0 w-8 text-sm font-black text-purple-600 focus:ring-0">
                    </div>
                    <button id="btnImgGen" onclick="generateImage()"
                        class="px-5 py-3 bg-purple-600 hover:bg-purple-500 text-white rounded-xl shadow-lg shadow-purple-500/20 transition-all flex items-center gap-2 border-0">
                        <span class="text-lg">🖼️</span>
                        <span class="font-black text-sm">이미지 생성</span>
                    </button>
                    <!-- 신규: 로컬 이미지 업로드 -->
                    <input type="file" id="localImgUpload" class="hidden" accept="image/*" onchange="uploadLocalImage(this)">
                    <button id="btnImgUpload" onclick="document.getElementById('localImgUpload').click()"
                        class="px-5 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl shadow-lg shadow-blue-500/20 transition-all flex items-center gap-2 border-0">
                        <span class="text-lg">📁</span>
                        <span class="font-black text-sm">이미지 업로드</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- Right: Result Tabs & Editor -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 lg:p-6 shadow-2xl border border-gray-100 dark:border-gray-700/50 min-h-[700px] flex flex-col relative w-full">
                <!-- Loading Overlay -->
                <div id="loadingOverlay" class="absolute inset-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden">
                    <div class="relative w-24 h-24 mb-6">
                        <div class="absolute inset-0 border-4 border-purple-500/20 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                        <div class="absolute inset-4 bg-purple-500/10 rounded-full flex items-center justify-center animate-pulse">
                            <span class="text-2xl">🪄</span>
                        </div>
                    </div>
                    <p class="text-xl font-black text-gray-900 dark:text-white tracking-tight">AI 다국어 작가가 글을 집필 중입니다...</p>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mt-2 font-bold animate-pulse">약 1~2분 정도 소요될 수 있습니다 (언어별 독립 작성 중)</p>
                    <div id="loadingStatusContainer" class="mt-8 space-y-2 w-64">
                        <!-- Progress for each language -->
                    </div>
                </div>

                <!-- Result Tabs -->
                <div class="flex items-center justify-between mb-6 border-b border-gray-100 dark:border-gray-700">
                    <div id="tabContainer" class="flex items-center gap-1 overflow-x-auto pb-1">
                        <!-- JS로 동적 생성됨 -->
                    </div>
                     <button id="btnPostToBlog" onclick="postToBlog()"
                        class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-xs font-black transition-all shadow-md flex items-center gap-2">
                        🚀 게시하기
                    </button>
                </div>

                <!-- Editor Section -->
                <div id="editorArea" class="flex-1 flex flex-col space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Title</label>
                        <input type="text" id="postTitle" oninput="saveCurrentTabData()"
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white font-bold text-base focus:ring-2 focus:ring-purple-500"
                            placeholder="제목이 여기에 나타납니다.">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Tags</label>
                            <input type="text" id="postTags" oninput="saveCurrentTabData()"
                                class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white font-bold text-xs"
                                placeholder="태그 (쉼표 구분)">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Summary</label>
                            <input type="text" id="postSummary" oninput="saveCurrentTabData()"
                                class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white font-bold text-xs"
                                placeholder="메타 설명 요약">
                        </div>
                    </div>

                    <div class="flex-1">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Content (HTML)</label>
                        <div class="flex border-b border-gray-200 dark:border-gray-700 mb-2">
                            <button onclick="switchMode('edit')" id="modeEdit" class="px-4 py-1 text-xs font-bold border-b-2 border-purple-500 text-purple-600">편집</button>
                            <button onclick="switchMode('preview')" id="modePreview" class="px-4 py-1 text-xs font-bold border-b-2 border-transparent text-gray-400">미리보기</button>
                        </div>
                        <textarea id="postContent" oninput="saveCurrentTabData()"
                            class="w-full h-[500px] bg-gray-50 dark:bg-gray-900/30 border-none rounded-xl p-4 text-gray-800 dark:text-gray-200 font-medium leading-relaxed resize-none focus:ring-0"
                            placeholder="글 내용이 여기에 나타납니다."></textarea>
                        <iframe id="postPreview" class="hidden w-full h-[500px] border border-gray-100 dark:border-gray-800 rounded-xl bg-white"></iframe>
                    </div>
                </div>
            </div>

            <div id="imageManager" class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-100 dark:border-gray-700/50 hidden animate-fadeIn mt-4">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-lg">🖼️</span>
                    <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Generated Images (Click to Remove)</h2>
                </div>
                <div id="imageList" class="grid grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Image list rendered here -->
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .tab-active { 
        background-color: #9333ea; 
        color: white; 
        box-shadow: 0 10px 15px -3px rgba(147, 51, 234, 0.3);
    }
    .tab-inactive { 
        color: #9ca3af; 
    }
    .tab-inactive:hover {
        color: #4b5563;
    }
    .dark .tab-inactive:hover {
        color: #d1d5db;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    let independentResults = {};
    let currentTab = 'wordpress';
    let connectedAccounts = [];

    // 연동 상태 정밀 체크
    async function checkHealth() {
        try {
            const res = await fetch('/api/health');
            const data = await res.json();
            const apis = data.apis || {};
            
            let issues = [];
            if (apis.blogger?.status !== 'ok') issues.push('Blogger');
            if (apis.wordpress?.status !== 'ok') issues.push('WordPress');
            if (apis.gemini?.status !== 'ok') issues.push('Gemini');

            const banner = document.getElementById('healthAlertBanner');
            const text = document.getElementById('healthAlertText');

            if (issues.length > 0) {
                console.log('연동 이슈 감지:', issues);
                // banner.classList.remove('hidden'); (제거 요청에 따라 숨김 유지)
            } else {
                banner.classList.add('hidden');
            }
        } catch (e) {
            console.error('Health Check Error:', e);
        }
    }

    // 1. 초기 연동 정보 로드
    async function initPage() {
        await checkHealth(); // 연동 상태 체크 우선 실행
        try {
            // WordPress 연동 확인 (Settings API)
            const wpRes = await fetch('/api/settings/keys');
            const wpData = await wpRes.json();
            const wpUrl = wpData.wp_url?.value || '';
            
            // [사이드바 이동] 렌더링 타겟 및 컨테이너 설정
            const sidebarContainer = document.getElementById('sidebar-platform-container');
            if (sidebarContainer) sidebarContainer.classList.remove('hidden');

            const platformsList = document.getElementById('sidebar-platform-list');
            platformsList.innerHTML = '';

            if (wpUrl) {
                platformsList.innerHTML += `
                    <li class="flex items-center gap-2 p-1.5 bg-blue-50/20 dark:bg-blue-900/10 rounded-xl border border-blue-500/10 transition-all hover:bg-blue-50/40 dark:hover:bg-blue-900/20">
                        <input type="checkbox" id="check_wordpress" checked class="w-3.5 h-3.5 rounded border-gray-300 text-blue-600 focus:ring-0 cursor-pointer">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center bg-blue-500 text-white rounded-lg text-[9px] font-black">W</span>
                            <span class="text-[10px] font-black text-gray-700 dark:text-gray-200 truncate uppercase mt-0.5">워드프레스</span>
                        </div>
                    </li>
                `;
            }

            // Blogger 연동 확인 (bData fetch 복구)
            const bRes = await fetch('/api/blog/accounts');
            const bData = await bRes.json();

            const allAccounts = (bData.accounts || []);
            connectedAccounts = allAccounts.filter(a => a.connected);

            allAccounts.forEach(acc => {
                const isConnected = acc.connected;
                const statusClass = isConnected 
                    ? 'bg-orange-50/20 dark:bg-orange-900/10 border-orange-500/10' 
                    : 'bg-red-50/10 dark:bg-red-900/5 border-red-500/20 opacity-80';
                
                platformsList.innerHTML += `
                    <li class="flex items-center justify-between gap-2 p-1.5 ${statusClass} rounded-xl border transition-all hover:bg-orange-50/40 dark:hover:bg-orange-900/20">
                        <div class="flex items-center gap-2 overflow-hidden flex-1">
                            <input type="checkbox" id="check_blogger_${acc.id}" data-acc-id="${acc.id}" ${isConnected ? 'checked' : ''} class="w-3.5 h-3.5 rounded border-gray-300 text-orange-600 focus:ring-0 cursor-pointer">
                            <div class="flex items-center gap-2 overflow-hidden">
                                <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center bg-orange-500 text-white rounded-lg text-[9px] font-black">B</span>
                                <span class="text-[10px] font-black text-gray-700 dark:text-gray-200 truncate uppercase mt-0.5">${acc.lang.toUpperCase()} BLOG</span>
                            </div>
                        </div>
                        ${!isConnected ? '<span title="재연동 필요" class="text-red-500 animate-pulse text-xs shrink-0">⚠️</span>' : ''}
                    </li>
                `;
            });

            if (!wpUrl && connectedAccounts.length === 0) {
                platformsList.innerHTML = '<li class="text-[9px] text-center text-gray-400 italic py-2">연동된 블로그 없음</li>';
            }

            renderTabs();
        } catch (e) {
            console.error('Init Error:', e);
            Utils.showToast('연동 정보를 가져오는데 실패했습니다.', 'error');
        }
    }

    // 소스 관리 로직 (NotebookLM 스타일)
    let sources = [];

    function showLoading(show, text = '처리 중...') {
        const overlay = document.getElementById('loadingOverlay');
        const loadingText = overlay.querySelector('.loading-text');
        if (loadingText) loadingText.innerText = text;
        if (show) overlay.classList.remove('hidden');
        else overlay.classList.add('hidden');
    }

    async function addSource(type) {
        let value = '';
        let fileName = '';
        
        if (type === 'url') {
            value = document.getElementById('sourceUrl').value.trim();
            if (!value) return;
            document.getElementById('sourceUrl').value = '';
        } else if (type === 'file') {
            const fileInput = document.getElementById('sourceFile');
            if (fileInput.files.length === 0) return;
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            showLoading(true, "파일 업로드 중...");
            try {
                const res = await fetch('/api/blog/upload-source-file', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    value = data.file_path;
                    fileName = data.original_name;
                } else {
                    alert(data.message);
                    return;
                }
            } catch (e) {
                alert("파일 업로드 실패");
                return;
            } finally {
                showLoading(false);
            }
        }

        const sourceId = Date.now();
        const sourceObj = {
            id: sourceId,
            type: value.includes('youtube.com') || value.includes('youtu.be') ? 'youtube' : (type === 'file' ? 'file' : 'url'),
            value: value,
            title: fileName || value,
            status: 'extracting',
            content: ''
        };
        
        sources.push(sourceObj);
        renderSources();
        extractContent(sourceId);
    }

    async function extractContent(id) {
        const source = sources.find(s => s.id === id);
        if (!source) return;

        try {
            const res = await fetch('/api/blog/extract-source', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: source.type, value: source.value })
            });
            const data = await res.json();
            
            if (data.status === 'ok') {
                source.status = 'ready';
                source.title = data.title;
                source.content = data.content;
            } else {
                source.status = 'error';
                source.title = `❌ 오류: ${data.message}`;
            }
        } catch (e) {
            source.status = 'error';
            source.title = '❌ 네트워크 오류';
        }
        
        renderSources();
        updateHiddenContent();
    }

    function removeSource(id) {
        sources = sources.filter(s => s.id !== id);
        renderSources();
        updateHiddenContent();
    }

    function renderSources() {
        const list = document.getElementById('sourceList');
        list.innerHTML = sources.map(s => `
            <div class="flex items-center justify-between p-2 bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 text-[10px] shadow-sm animate-fadeIn">
                <div class="flex items-center gap-2 overflow-hidden">
                    <span class="${s.status === 'ready' ? 'text-green-500' : (s.status === 'error' ? 'text-red-500' : 'animate-pulse text-blue-500')}">
                        ${s.status === 'ready' ? '✅' : (s.status === 'error' ? '⚠️' : '⏳')}
                    </span>
                    <span class="truncate dark:text-gray-300 font-bold max-w-[150px]">${s.title}</span>
                </div>
                <button onclick="removeSource(${s.id})" class="text-gray-400 hover:text-red-500 transition-all p-1">✖</button>
            </div>
        `).join('');
    }

    function updateHiddenContent() {
        const allContent = sources
            .filter(s => s.status === 'ready')
            .map(s => `[SOURCE: ${s.title}]\n${s.content}`)
            .join('\n\n---\n\n');
        document.getElementById('hiddenSourceContent').value = allContent;
    }

    // 2. 독립적 다국어 생성 실행
    async function generateIndependentMulti() {
        const topic = document.getElementById('topicInput').value.trim();
        const category = document.getElementById('categorySelect').value;
        if (!topic) {
            Utils.showToast('주제를 입력해주세요.', 'warning');
            return;
        }

        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.remove('hidden');

        // 요청할 플랫폼 구성 (체크된 블로그만 포함)
        const platforms = [];
        
        // 워드프레스 체크 확인
        const wpCheck = document.getElementById('check_wordpress');
        if (wpCheck && wpCheck.checked) {
            platforms.push({ language: 'ko', platform: 'wordpress', target_id: 'wordpress', category: category });
        }

        // 블로거 체크 확인
        connectedAccounts.forEach(acc => {
            const bCheck = document.getElementById(`check_blogger_${acc.id}`);
            if (bCheck && bCheck.checked) {
                platforms.push({ 
                    language: acc.lang || 'ja', 
                    platform: 'blogger', 
                    target_id: `blogger:${acc.id}`,
                    category: category
                });
            }
        });

        if (platforms.length === 0) {
            Utils.showToast('작업을 진행할 블로그를 최소 하나 선택해주세요.', 'warning');
            overlay.classList.add('hidden');
            return;
        }

        try {
            const sourceContent = document.getElementById('hiddenSourceContent').value;
            const res = await fetch('/api/blog/generate-independent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    topic, 
                    platforms, 
                    category,
                    source_content: sourceContent // 학습된 소스 본문 포함
                })
            });
            const data = await res.json();
            
            if (data.status === 'ok') {
                // 결과 저장
                independentResults = {};
                data.results.forEach(item => {
                    if (item.status === 'ok') {
                        independentResults[item.target_id] = {
                            title: item.title,
                            content: item.content,
                            tags: Array.isArray(item.tags) ? item.tags.join(', ') : (item.tags || ''),
                            summary: item.summary || ''
                        };
                    } else {
                        // 생성 실패 시 에러 메시지 표시
                        independentResults[item.target_id] = {
                            title: '❌ 생성 실패',
                            content: `<div class="p-6 bg-red-500/10 border border-red-500/30 rounded-2xl text-red-400">
                                <h3 class="font-black mb-2 flex items-center gap-2">⚠️ 콘텐츠 생성 오류</h3>
                                <p class="text-sm opacity-80">${item.error || '알 수 없는 오류가 발생했습니다.'}</p>
                            </div>`,
                            tags: '',
                            summary: '생성 실패'
                        };
                    }
                });
                
                // 첫 번째 탭 표시
                currentTab = 'wordpress';
                loadTabData(currentTab);
                renderTabs();
                Utils.showToast('모든 언어의 고품질 콘텐츠가 독립적으로 생성되었습니다!', 'success');
            } else {
                throw new Error(data.error || '생성 실패');
            }
        } catch (e) {
            Utils.showToast(e.message, 'error');
        } finally {
            overlay.classList.add('hidden');
        }
    }

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        let html = `
            <button onclick="switchTab('wordpress')" 
                class="px-4 py-2 text-xs font-black rounded-t-xl transition-all ${currentTab === 'wordpress' ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 hover:bg-gray-50'}">
                한국어 (WP)
            </button>
        `;

        connectedAccounts.forEach(acc => {
            const tid = `blogger:${acc.id}`;
            html += `
                <button onclick="switchTab('${tid}')" 
                    class="px-4 py-2 text-xs font-black rounded-t-xl transition-all ${currentTab === tid ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-400 hover:bg-gray-50'}">
                    ${acc.lang.toUpperCase()} (Blog)
                </button>
            `;
        });
        container.innerHTML = html;
    }

    function switchTab(tid) {
        saveCurrentTabData();
        currentTab = tid;
        loadTabData(tid);
        renderTabs();
    }

    function loadTabData(tid) {
        const data = independentResults[tid] || { title: '', content: '', tags: '', summary: '' };
        document.getElementById('postTitle').value = data.title;
        document.getElementById('postContent').value = data.content;
        document.getElementById('postTags').value = data.tags;
        document.getElementById('postSummary').value = data.summary;
        
        if (currentMode === 'preview') updatePreview();
        scanImages(); // 이미지 스캔 및 관리자 업데이트
    }

    function saveCurrentTabData() {
        if (!independentResults[currentTab]) independentResults[currentTab] = {};
        independentResults[currentTab].title = document.getElementById('postTitle').value;
        independentResults[currentTab].content = document.getElementById('postContent').value;
        independentResults[currentTab].tags = document.getElementById('postTags').value;
        independentResults[currentTab].summary = document.getElementById('postSummary').value;
    }

    let currentMode = 'edit';
    function switchMode(mode) {
        currentMode = mode;
        const editBtn = document.getElementById('modeEdit');
        const prevBtn = document.getElementById('modePreview');
        const editor = document.getElementById('postContent');
        const preview = document.getElementById('postPreview');

        if (mode === 'preview') {
            editBtn.classList.remove('border-purple-500', 'text-purple-600');
            editBtn.classList.add('border-transparent', 'text-gray-400');
            prevBtn.classList.add('border-purple-500', 'text-purple-600');
            prevBtn.classList.remove('border-transparent', 'text-gray-400');
            editor.classList.add('hidden');
            preview.classList.remove('hidden');
            updatePreview();
        } else {
            prevBtn.classList.remove('border-purple-500', 'text-purple-600');
            prevBtn.classList.add('border-transparent', 'text-gray-400');
            editBtn.classList.add('border-purple-500', 'text-purple-600');
            editBtn.classList.remove('border-transparent', 'text-gray-400');
            preview.classList.add('hidden');
            editor.classList.remove('hidden');
        }
    }

    function updatePreview() {
        const html = document.getElementById('postContent').value;
        const iframe = document.getElementById('postPreview');
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        doc.write(html);
        doc.close();
    }

    async function postToBlog() {
        saveCurrentTabData(); // 현재 보고 있는 탭의 수정사항 저장

        const targetIds = Object.keys(independentResults);
        if (targetIds.length === 0) {
            Utils.showToast('게시할 생성된 내용이 없습니다. 먼저 작성을 시작해 주세요.', 'warning');
            return;
        }

        if (!confirm(`생성된 ${targetIds.length}개 언어의 모든 포스팅을 각 블로그에 동시 게시하시겠습니까?`)) return;

        const btn = document.getElementById('btnPostToBlog');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span>⏳</span><span>전체 게시 중...</span>';

        try {
            // 1. 모든 플랫폼의 데이터를 BlogPostRequest 규격에 맞게 취합
            const platforms = [];
            const contents = {};
            const metadata = {};
            const platform_langs = {};

            targetIds.forEach(tid => {
                const data = independentResults[tid];
                if (!data.content) return;

                platforms.push(tid);
                contents[tid] = data.content;
                metadata[tid] = {
                    title: data.title,
                    tags: data.tags.split(',').map(t => t.trim()).filter(t => t),
                    summary: data.summary
                };

                // 언어 코드 매핑
                if (tid === 'wordpress') {
                    platform_langs['wordpress'] = 'ko';
                } else {
                    const accId = tid.split(':')[1];
                    const acc = connectedAccounts.find(a => String(a.id) === String(accId));
                    // DB에 저장된 언어 코드를 정확히 사용 (없으면 기본값 설정)
                    const targetLang = acc ? (acc.lang || 'ja') : 'ja';
                    platform_langs[tid.replace(':', '_')] = targetLang;
                    console.log(`[Batch] Mapping ${tid} to language: ${targetLang}`);
                }
            });

            // 대표 메타데이터 (보통 첫 번째 탭 기준)
            const firstTid = targetIds[0];
            const mainData = independentResults[firstTid];

            const payload = {
                title: mainData.title,
                content: mainData.content,
                tags: mainData.tags.split(',').map(t => t.trim()).filter(t => t),
                summary: mainData.summary,
                platforms: platforms,
                contents: contents,
                metadata: metadata,
                platform_langs: platform_langs
            };

            const res = await fetch('/api/blog/post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();

            if (result.status === 'ok' || result.status === 'partial') {
                let successCount = 0;
                let failureCount = 0;
                let errorMessages = [];

                Object.entries(result.results || {}).forEach(([pKey, pRes]) => {
                    if (pRes.status === 'ok') {
                        successCount++;
                        if (pRes.url) window.open(pRes.url, '_blank');
                    } else {
                        failureCount++;
                        errorMessages.push(`${pKey}: ${pRes.error}`);
                    }
                });

                if (failureCount === 0) {
                    Utils.showToast(`🎉 모든 블로그(${successCount}개)에 성공적으로 게시되었습니다!`, 'success');
                } else {
                    Utils.showToast(`${successCount}개 성공, ${failureCount}개 실패. 오류: ${errorMessages.join(', ')}`, 'warning');
                }
            } else {
                throw new Error(result.error || '전체 게시 중 오류가 발생했습니다.');
            }
        } catch (e) {
            console.error('Batch Post Error:', e);
            Utils.showToast(e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    // 3. 이미지 생성 기능 (무조건 한국어 우선 생성 및 전체 동기화)
    async function generateImage() {
        // 1. 한국어(WordPress) 본문 우선 확보
        let wpContent = independentResults['wordpress'] ? independentResults['wordpress'].content : "";
        if (!wpContent || wpContent.length < 50) {
            // 한국어가 없으면 현재 보고 있는 탭이라도 사용
            wpContent = document.getElementById('postContent').value.trim();
        }

        if (!wpContent) {
            Utils.showToast('이미지를 삽입할 본문 내용이 필요합니다. 먼저 한국어 내용을 생성해 주세요.', 'warning');
            return;
        }

        const count = parseInt(document.getElementById('imgCount').value) || 1;
        const noHuman = document.getElementById('noHumanToggle').checked; // 사람 제거 토글 상태 읽기
        const btn = document.getElementById('btnImgGen');
        const originalText = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<span class="animate-spin inline-block">⏳</span><span class="font-bold text-sm ml-2">생성 중...</span>';

        try {
            // 백엔드 API: /api/blog/generate-images (한국어 본문을 기준으로 이미지 생성 및 WP 미디어 라이브러리 업로드)
            const res = await fetch('/api/blog/generate-images', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: wpContent,
                    image_count: count,
                    project_id: null,
                    no_human: noHuman // 사람 제거 옵션 전달
                })
            });
            const data = await res.json();

            if (data.status === 'ok' && data.content) {
                // [핵심] 1. 한국어 본문에 이미지 적용
                if (independentResults['wordpress']) {
                    independentResults['wordpress'].content = data.content;
                }
                
                // [핵심] 2. 생성된 이미지 태그들 추출 (<img ... src="WP_MEDIA_URL" ...>)
                const imgRegex = /<img[^>]+src="([^">]+)"[^>]*>/g;
                const matches = [...data.content.matchAll(imgRegex)];
                const imgTags = matches.map(m => m[0]); // 전체 img 태그 배열

                if (imgTags.length > 0) {
                    // [공통 개선] 이미지 배포 로직 호출
                    imgTags.forEach(tag => distributeImageToAllTabs(tag));
                    
                    // 현재 보고 있는 탭 갱신
                    document.getElementById('postContent').value = independentResults[currentTab].content;
                    saveCurrentTabData();
                    if (typeof currentMode !== 'undefined' && currentMode === 'preview') {
                        updatePreview();
                    }
                    scanImages(); // 이미지 생성 후 대시보드 갱신
                    
                    Utils.showToast(`🎉 ${imgTags.length}개의 고화질 이미지가 모든 언어 블로그에 동시 연동되었습니다!`, 'success');
                } else {
                    Utils.showToast('이미지는 생성되었으나 본문 삽입에 실패했습니다.', 'warning');
                }
            } else {
                throw new Error(data.error || '이미지 생성 및 삽입에 실패했습니다.');
            }
        } catch (e) {
            console.error('Image Generation Error:', e);
            Utils.showToast(`이미지 생성 실패: ${e.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    // --- [신규] 이미지 관리 및 삭제 기능 ---
    function scanImages() {
        const content = document.getElementById('postContent').value;
        const manager = document.getElementById('imageManager');
        const list = document.getElementById('imageList');
        
        // 정규식: premium-blog-image div 또는 figure 블록 내부의 img 태그 추출
        // 최대한 블록 전체를 잡기 위해 시도
        const imgRegex = /<div[^>]*class="premium-blog-image"[^>]*>[\s\S]*?<img[^>]*src="([^">]+)"[^>]*>[\s\S]*?<\/div>|<figure[^>]*>[\s\S]*?<img[^>]*src="([^">]+)"[^>]*>[\s\S]*?<\/figure>|<img[^>]*src="([^">]+)"[^>]*>/gi;
        
        const images = [];
        let match;
        while ((match = imgRegex.exec(content)) !== null) {
            const fullTag = match[0];
            const src = match[1] || match[2] || match[3];
            if (src) images.push({ fullTag, src });
        }

        if (images.length === 0) {
            manager.classList.add('hidden');
            return;
        }

        manager.classList.remove('hidden');
        list.innerHTML = images.map((img, idx) => `
            <div class="relative group aspect-video bg-gray-200 dark:bg-gray-700 rounded-lg overflow-hidden border border-gray-200 dark:border-gray-600 shadow-sm">
                <img src="${img.src}" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <button onclick="removeImageFromContent('${img.src.replace(/'/g, "\\'")}')" 
                        class="bg-red-500 hover:bg-red-600 text-white p-2 rounded-full shadow-lg transform hover:scale-110 transition-all"
                        title="이미지 삭제">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
                <div class="absolute bottom-1 right-1 bg-black/60 text-[8px] text-white px-1 rounded font-mono">IMG ${idx + 1}</div>
            </div>
        `).join('');
    }

    function removeImageFromContent(src) {
        if (!confirm('정말 이 이미지를 본문에서 영구적으로 삭제하시겠습니까?')) return;
        
        const editor = document.getElementById('postContent');
        let content = editor.value;
        
        // 해당 src를 포함하는 div 또는 figure 블록을 정밀 타격하여 제거
        const blockRegex = new RegExp(`<div[^>]*class="premium-blog-image"[^>]*>[\\s\\S]*?<img[^>]*src="${src}"[\\s\\S]*?</div>|<figure[^>]*>[\\s\\S]*?<img[^>]*src="${src}"[\\s\\S]*?</figure>|<img[^>]*src="${src}"[^>]*>`, 'gi');
        
        const newContent = content.replace(blockRegex, '').trim();
        editor.value = newContent;
        
        // 상태 동기화 및 UI 갱신
        saveCurrentTabData();
        scanImages();
        if (currentMode === 'preview') updatePreview();
        Utils.showToast('이미지가 본문에서 삭제되었습니다.', 'info');
    }

    // [공통] 이미지를 모든 언어 탭의 적절한 위치에 삽입하는 함수
    function distributeImageToAllTabs(imgTagWithStyle) {
        Object.keys(independentResults).forEach(tid => {
            let targetContent = independentResults[tid].content;
            if (!targetContent) return;

            // 이미지가 이미 포함되어 있는지 확인 (src 기준)
            const srcMatch = imgTagWithStyle.match(/src="([^">]+)"/);
            if (srcMatch && targetContent.includes(srcMatch[1])) return;

            const paragraphs = targetContent.split('</p>');
            if (paragraphs.length > 3) {
                // 문단이 많으면 중간(약 1/2 지점)에 삽입
                const mid = Math.floor(paragraphs.length / 2);
                paragraphs[mid] = paragraphs[mid] + `</p>\n${imgTagWithStyle}\n`;
                independentResults[tid].content = paragraphs.join('</p>').replace('</p></p>', '</p>');
            } else {
                // 문단이 적으면 맨 뒤에 삽입
                independentResults[tid].content = targetContent + `\n${imgTagWithStyle}\n`;
            }
        });
    }

    async function uploadLocalImage(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        
        const btn = document.getElementById('btnImgUpload');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span>⏳</span><span class="text-xs ml-1">업로드 중...</span>';

        try {
            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch('/api/blog/upload-image', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            if (data.status === 'ok') {
                // 1. 모든 탭에 이미지 배포
                distributeImageToAllTabs(data.html);
                
                // 2. 현재 화면 갱신
                document.getElementById('postContent').value = independentResults[currentTab].content;
                saveCurrentTabData();
                scanImages();
                if (currentMode === 'preview') updatePreview();
                
                Utils.showToast('이미지가 성공적으로 업로드되어 모든 탭에 적용되었습니다!', 'success');
            } else {
                throw new Error(data.error || '업로드 실패');
            }
        } catch (e) {
            Utils.showToast(e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
            input.value = ''; // 초기화
        }
    }

    document.addEventListener('DOMContentLoaded', initPage);
</script>
